name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

# One review per PR; a new push cancels the in-flight review to save API/CI cost.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: AI first-pass review
    runs-on: ubuntu-latest
    # Secrets are not exposed to fork PRs, so the job would only fail there.
    # Same-repo (team) PRs get the auto-review; fork PRs are reviewed by a human
    # or by a maintainer commenting `@claude review`.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
          # Advisory first pass — CLAUDE.md carries the repo standards it reviews against.
          claude_args: "--max-turns 15"
