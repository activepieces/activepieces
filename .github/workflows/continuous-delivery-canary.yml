name: Continuous Delivery — Canary

on:
  workflow_dispatch:
    inputs:
      platform_ids:
        description: 'Comma-separated platform IDs to route to canary (leave blank to skip routing update)'
        required: false
        default: ''

jobs:
  build-image:
    runs-on: ubuntu-24.04
    concurrency:
      group: canary-deploy
      cancel-in-progress: true
    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: set-tag
        run: |
          RELEASE=$(node --print "require('./package.json').version")
          echo "image_tag=${RELEASE}.${{ github.sha }}.canary" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: depot/setup-action@v1

      - uses: depot/build-push-action@v1
        with:
          project: du7O4b0e8P
          token: ${{ secrets.DEPOT_PROJECT_TOKEN }}
          context: .
          file: ./Dockerfile
          platforms: |
            linux/amd64
            linux/arm64
          push: true
          no-cache: true
          tags: ghcr.io/activepieces/activepieces-cloud:${{ steps.set-tag.outputs.image_tag }}

  deploy-canary:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/ops.key
          chmod 600 ~/.ssh/ops.key
          cat >>~/.ssh/config <<END
          Host ops
            HostName $SSH_HOST
            User $SSH_USER
            IdentityFile ~/.ssh/ops.key
            StrictHostKeyChecking no
          END
        env:
          SSH_USER: ${{ secrets.DEV_OPS_USERNAME }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.DEV_OPS_HOST }}

      - name: Deploy canary app
        run: |
          ssh ops -t -t 'bash -ic "cd mrsk/prod && kamal deploy --version ${{ needs.build-image.outputs.image_tag }} --config-file=config/app-canary.yml --skip-push; exit"'

      - name: Deploy canary workers
        run: |
          ssh ops -t -t 'bash -ic "cd mrsk/prod && kamal deploy --version ${{ needs.build-image.outputs.image_tag }} --config-file=config/worker.yml --roles=canary --skip-push; exit"'

      - name: Update canary platform routing
        if: ${{ inputs.platform_ids != '' }}
        env:
          PLATFORM_IDS: ${{ inputs.platform_ids }}
          AP_API_KEY: ${{ secrets.AP_API_KEY }}
        run: |
          IFS=',' read -ra IDS <<< "$PLATFORM_IDS"
          for ID in "${IDS[@]}"; do
            ID=$(echo "$ID" | tr -d '[:space:]')
            echo "Enabling canary routing for platform: $ID"
            curl --fail-with-body -s -X POST "https://cloud.activepieces.com/v1/admin/platforms/canary" \
              -H "api-key: $AP_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"platformId\":\"$ID\",\"canary\":true}"
          done
