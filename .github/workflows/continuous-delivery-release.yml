name: Continuous Delivery — Release

on:
  schedule:
    - cron: '0 14 * * 2' # Every Tuesday at 14:00 UTC
  workflow_dispatch:

jobs:
  weekly-release:
    runs-on: ubuntu-24.04
    environment:
      name: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: release-candidate

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared package
        run: bun run --cwd packages/shared build

      - name: Build server-utils package
        run: bun run --cwd packages/server/utils build

      - name: Set version from package.json
        id: version
        run: |
          RELEASE=$(node --print "require('./package.json').version")
          echo "release=$RELEASE" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail if Docker tag already exists with a different digest
        run: |
          VERSION=${{ steps.version.outputs.release }}
          CANDIDATE_DIGEST=$(docker buildx imagetools inspect --raw ghcr.io/activepieces/activepieces-cloud:release-candidate | sha256sum | awk '{print $1}')
          EXISTING_DIGEST=$(docker buildx imagetools inspect --raw activepieces/activepieces:$VERSION 2>/dev/null | sha256sum | awk '{print $1}' || echo "")
          if [[ -z "$EXISTING_DIGEST" ]]; then
            echo "Tag $VERSION does not exist yet — proceeding."
            exit 0
          fi
          if [[ "$EXISTING_DIGEST" == "$CANDIDATE_DIGEST" ]]; then
            echo "Tag $VERSION already exists and matches release-candidate digest — idempotent rerun, proceeding."
            exit 0
          fi
          echo "Tag $VERSION already exists with a different digest — refusing to overwrite."
          exit 1

      - name: Check for breaking migrations
        id: migration-check
        run: bunx tsx tools/scripts/check-release-migrations.ts ${{ steps.version.outputs.release }}

      - name: Create or update changelog via release-drafter
        uses: release-drafter/release-drafter@v5
        with:
          commitish: main
          prerelease: false
          tag: ${{ steps.version.outputs.release }}
          name: ${{ steps.version.outputs.release }}
          version: ${{ steps.version.outputs.release }}
          latest: true
          publish: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create git tag
        run: |
          git tag -f ${{ steps.version.outputs.release }}
          git push origin ${{ steps.version.outputs.release }} --force

      - name: Publish release images
        run: |
          docker buildx imagetools create \
            --tag activepieces/activepieces:${{ steps.version.outputs.release }} \
            --tag activepieces/activepieces:latest \
            --tag ghcr.io/activepieces/activepieces:${{ steps.version.outputs.release }} \
            --tag ghcr.io/activepieces/activepieces:latest \
            ghcr.io/activepieces/activepieces-cloud:release-candidate

      - name: Add breaking migration note to release
        if: steps.migration-check.outputs.has_breaking == 'true'
        run: |
          VERSION=${{ steps.version.outputs.release }}
          BODY=$(gh release view "$VERSION" --json body -q .body)

          NOTE=$(cat <<EOF

          ---

          > **Note:** This release includes database changes that can't be automatically rolled back (${{ steps.migration-check.outputs.breaking_names }}). See the [rollback guide](https://www.activepieces.com/docs/install/guides/rollback) for details.
          EOF
          )

          gh release edit "$VERSION" --notes "${BODY}${NOTE}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
