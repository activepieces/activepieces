name: Continuous Delivery — Release test

on:
  push:
    branches:
      - fix/release-ci-v2

jobs:
  weekly-release:
    runs-on: ubuntu-24.04
    environment:
      name: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: release-candidate

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared package
        run: bun run --cwd packages/shared build

      - name: Build server-utils package
        run: bun run --cwd packages/server/utils build

      - name: Check for breaking migrations
        id: migration-check
        run: bunx tsx tools/scripts/check-release-migrations.ts ${{ steps.version.outputs.release }}
