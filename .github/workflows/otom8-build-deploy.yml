name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub is moving JS actions to Node 24; silences deprecation annotations on checkout/docker actions.
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ghcr.io/sameerzahiddd/activepieces

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY }}
            VITE_DEPLOY_ENV=prod
            VITE_OTOM8_SITE_URL=https://otom8.us
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          no-cache: true

  deploy:
    name: Deploy to DigitalOcean
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1
        with:
          host: 134.199.220.255
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/ap
            git pull origin main
            docker compose pull app worker
            docker compose up -d --no-deps app worker
            docker image prune -f
            echo "==> Health check: /api/v1/flags inside app container"
            ok=0
            for i in $(seq 1 45); do
              if docker compose exec -T app curl -sf http://127.0.0.1/api/v1/flags >/dev/null 2>&1; then
                echo "    OK after ${i}s"
                ok=1
                break
              fi
              sleep 2
            done
            if [ "$ok" != "1" ]; then
              echo "ERROR: Deploy finished but AP did not pass health check. Check: docker compose logs app" >&2
              exit 1
            fi
