name: Benchmark

on:
  push:
    branches:
      - feat/worker-v2
  workflow_dispatch:
    inputs:
      apps:
        description: 'Number of app containers'
        required: false
        default: '1'
      workers:
        description: 'Number of worker containers'
        required: false
        default: '2'
      total_requests:
        description: 'Total number of requests for hey'
        required: false
        default: '500'

jobs:
  benchmark:
    runs-on: depot-ubuntu-24.04-16
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t activepieces-benchmark:local .

      - name: Start benchmark stack
        run: |
          APP_REPLICAS=${{ github.event.inputs.apps }} \
          WORKER_REPLICAS=${{ github.event.inputs.workers }} \
            docker compose -f benchmark/docker-compose.yml up -d
          echo "Waiting for containers to start..."
          sleep 5
          docker compose -f benchmark/docker-compose.yml ps

      - name: Setup flow and wait for app
        id: setup
        run: |
          chmod +x benchmark/setup.sh
          FLOW_ID=$(benchmark/setup.sh)
          echo "flow_id=$FLOW_ID" >> "$GITHUB_OUTPUT"
          echo "Flow ID: $FLOW_ID"

      - name: Install hey
        run: |
          go install github.com/rakyll/hey@latest

      - name: Warmup
        run: |
          echo "Running warmup: 500 requests, ${{ github.event.inputs.workers }} concurrency"
          hey -n 500 -c ${{ github.event.inputs.workers }} -t 60 \
              -m POST \
              -H "Content-Type: application/json" \
              -d '{"test":true}' \
              "http://localhost:8080/api/v1/webhooks/${{ steps.setup.outputs.flow_id }}/sync" \
              | tail -5
          echo "Warmup complete"

      - name: Run benchmark
        run: |
          echo "Running benchmark: ${{ github.event.inputs.total_requests }} requests, ${{ github.event.inputs.workers }} concurrency (= workers), ${{ github.event.inputs.apps }} apps"
          echo "---"
          hey -n ${{ github.event.inputs.total_requests }} \
              -c ${{ github.event.inputs.workers }} \
              -t 60 \
              -m POST \
              -H "Content-Type: application/json" \
              -d '{"test":true}' \
              "http://localhost:8080/api/v1/webhooks/${{ steps.setup.outputs.flow_id }}/sync" \
              | tee /tmp/hey-output.txt

      - name: Parse results
        run: |
          chmod +x benchmark/parse.sh
          benchmark/parse.sh /tmp/hey-output.txt

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: /tmp/hey-output.txt

      - name: Show container logs on failure
        if: failure()
        run: |
          docker compose -f benchmark/docker-compose.yml logs --tail=100

      - name: Teardown
        if: always()
        run: docker compose -f benchmark/docker-compose.yml down -v
