name: Continuous Delivery — K8s (Hetzner)

on:
  push:
    branches: [main, feat/worker-v2]
  schedule:
    - cron: '0 9 * * *'  # Daily at 9 AM UTC — promote staging to prod (+ official release on Sundays)
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - deploy-staging
          - deploy-staging-skip-freeze
          - promote-to-production  # Hotfix: promote staging to prod immediately
          - cloud-hotfix           # Build, deploy to staging, then promote to prod in one go
          - weekly-release         # Trigger official release manually

# --- STAGING JOBS (run on push to main OR manual "deploy-staging") ---

jobs:
  check-freeze:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      frozen: ${{ steps.check.outputs.frozen }}
    steps:
      - name: Check staging freeze window (5 PM - 9 AM UTC)
        id: check
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" -ge 17 ] || [ "$HOUR" -lt 9 ]; then
            echo "Staging is frozen (current UTC hour: $HOUR). Skipping deploy."
            echo "frozen=true" >> $GITHUB_OUTPUT
          else
            echo "frozen=false" >> $GITHUB_OUTPUT
          fi

  build-image:
    needs: [check-freeze]
    if: |
      always() &&
      ((github.event_name == 'push' && needs.check-freeze.outputs.frozen == 'false') ||
       (github.event_name == 'workflow_dispatch' && (github.event.inputs.action == 'deploy-staging' || github.event.inputs.action == 'deploy-staging-skip-freeze' || github.event.inputs.action == 'cloud-hotfix')))
    runs-on: ubuntu-24.04
    concurrency:
      group: deploy-k8s-build
      cancel-in-progress: true
    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Set image tag
        id: set-tag
        run: |
          RELEASE=$(node --print "require('./package.json').version")
          echo "image_tag=${RELEASE}.${{ github.sha }}.beta" >> $GITHUB_OUTPUT
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: depot/setup-action@v1
      - uses: depot/build-push-action@v1
        with:
          project: du7O4b0e8P
          token: ${{ secrets.DEPOT_PROJECT_TOKEN }}
          context: .
          file: ./Dockerfile
          platforms: |
            linux/amd64
            linux/arm64
          push: true
          no-cache: true
          tags: ghcr.io/activepieces/activepieces-cloud:${{ steps.set-tag.outputs.image_tag }}

  deploy-staging:
    needs: build-image
    if: always() && needs.build-image.result == 'success'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-k8s-staging
      cancel-in-progress: false   # never cancel mid-flight helm upgrade
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/ops.key
          chmod 600 ~/.ssh/ops.key
          cat >>~/.ssh/config <<END
          Host ops
            HostName $SSH_HOST
            User $SSH_USER
            IdentityFile ~/.ssh/ops.key
            StrictHostKeyChecking no
          END
        env:
          SSH_USER: ${{ secrets.DEV_OPS_USERNAME }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.DEV_OPS_HOST }}

      - name: Deploy APP to staging
        run: |
          ssh ops "cd /root/k8n2/staging && \
            helm upgrade --install activepieces deploy/activepieces-helm/ \
              --namespace activepieces \
              --values deploy/staging/stg-app-values.yaml \
              --set image.tag=${{ needs.build-image.outputs.image_tag }} \
              --server-side --force-conflicts"

      - name: Wait for APP rollout to be healthy
        run: |
          ssh ops 'bash -s' <<'ENDSSH'
          set -euo pipefail
          timeout=300
          elapsed=0
          while [ $elapsed -lt $timeout ]; do
            PHASE=$(kubectl --context stg get rollout activepieces -n activepieces \
              -o jsonpath='{.status.phase}' 2>/dev/null || echo "Unknown")
            [ -z "$PHASE" ] && PHASE="Unknown"
            echo "APP phase: $PHASE"
            case $PHASE in
              Paused|Healthy) exit 0 ;;
              Degraded|Error|Aborted)
                echo "::error::APP rollout failed: $PHASE"
                kubectl --context stg get pods -n activepieces
                kubectl --context stg argo rollouts get rollout activepieces -n activepieces || true
                kubectl --context stg get events -n activepieces --sort-by='.lastTimestamp' | tail -30
                kubectl --context stg argo rollouts abort activepieces -n activepieces || true
                exit 1 ;;
            esac
            sleep 10
            elapsed=$((elapsed + 10))
          done
          echo "::error::APP rollout timed out after ${timeout}s (last phase: $PHASE)"
          exit 1
          ENDSSH

      - name: Promote APP
        run: ssh ops 'kubectl --context stg argo rollouts promote activepieces -n activepieces'

      - name: Wait for APP promotion to complete
        run: ssh ops 'kubectl --context stg argo rollouts status activepieces -n activepieces --timeout=5m'

      - name: Deploy WORKER to staging
        run: |
          ssh ops "cd /root/k8n2/staging && \
            helm upgrade --install activepieces-worker deploy/activepieces-helm/ \
              --namespace activepieces \
              --values deploy/staging/stg-worker-values.yaml \
              --set image.tag=${{ needs.build-image.outputs.image_tag }}"

      - name: Wait for WORKER to be healthy
        run: |
          ssh ops 'bash -s' <<'ENDSSH'
          set -euo pipefail
          if ! kubectl --context stg rollout status statefulset/activepieces-worker \
              -n activepieces --timeout=300s; then
            kubectl --context stg get pods -n activepieces
            kubectl --context stg describe statefulset activepieces-worker -n activepieces || true
            kubectl --context stg get events -n activepieces --sort-by='.lastTimestamp' | tail -30
            exit 1
          fi
          ENDSSH

  # --- PROMOTION JOBS (run on schedule OR manual "promote-to-production") ---

  promote-to-production:
    needs: [deploy-staging]
    if: |
      always() &&
      (github.event_name == 'schedule' ||
       (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'promote-to-production') ||
       (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'cloud-hotfix' && needs.deploy-staging.result == 'success'))
    runs-on: ubuntu-latest
    environment:
      name: production         # GitHub Environment gate — requires reviewer approval
      url: https://cloud.activepieces.com
    concurrency:
      group: promote-production
      cancel-in-progress: false
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/ops.key
          chmod 600 ~/.ssh/ops.key
          cat >>~/.ssh/config <<END
          Host ops
            HostName $SSH_HOST
            User $SSH_USER
            IdentityFile ~/.ssh/ops.key
            StrictHostKeyChecking no
          END
        env:
          SSH_USER: ${{ secrets.DEV_OPS_USERNAME }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.DEV_OPS_HOST }}

      - name: Get staging image tag
        id: image
        run: |
          TAG=$(ssh ops 'bash -s' <<'ENDSSH'
          kubectl --context stg get rollout activepieces -n activepieces \
            -o jsonpath='{.spec.template.spec.containers[0].image}' \
            | awk -F: '{print $NF}'
          ENDSSH
          )
          echo "image_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Deploy APP to production
        run: |
          ssh ops "cd /root/k8n2/prod && \
            helm upgrade --install activepieces deploy/activepieces-helm/ \
              --namespace activepieces \
              --values deploy/prod/prod-app-values.yaml \
              --set image.tag=${{ steps.image.outputs.image_tag }} \
              --server-side --force-conflicts"

      - name: Wait for APP rollout to be healthy
        run: |
          ssh ops 'bash -s' <<'ENDSSH'
          set -euo pipefail
          timeout=300
          elapsed=0
          while [ $elapsed -lt $timeout ]; do
            PHASE=$(kubectl --context prod get rollout activepieces -n activepieces \
              -o jsonpath='{.status.phase}' 2>/dev/null || echo "Unknown")
            [ -z "$PHASE" ] && PHASE="Unknown"
            echo "APP phase: $PHASE"
            case $PHASE in
              Paused|Healthy) exit 0 ;;
              Degraded|Error|Aborted)
                echo "::error::APP rollout failed: $PHASE"
                kubectl --context prod get pods -n activepieces
                kubectl --context prod argo rollouts get rollout activepieces -n activepieces || true
                kubectl --context prod get events -n activepieces --sort-by='.lastTimestamp' | tail -30
                kubectl --context prod argo rollouts abort activepieces -n activepieces || true
                exit 1 ;;
            esac
            sleep 10
            elapsed=$((elapsed + 10))
          done
          echo "::error::APP rollout timed out after ${timeout}s (last phase: $PHASE)"
          exit 1
          ENDSSH

      - name: Promote APP
        run: ssh ops 'kubectl --context prod argo rollouts promote activepieces -n activepieces'

      - name: Wait for APP promotion to complete
        run: ssh ops 'kubectl --context prod argo rollouts status activepieces -n activepieces --timeout=5m'

      - name: Deploy WORKER to production
        run: |
          ssh ops "cd /root/k8n2/prod && \
            helm upgrade --install activepieces-worker deploy/activepieces-helm/ \
              --namespace activepieces \
              --values deploy/prod/prod-worker-values.yaml \
              --set image.tag=${{ steps.image.outputs.image_tag }}"

      - name: Wait for WORKER to be healthy
        run: |
          ssh ops 'bash -s' <<'ENDSSH'
          set -euo pipefail
          if ! kubectl --context prod rollout status statefulset/activepieces-worker \
              -n activepieces --timeout=300s; then
            kubectl --context prod get pods -n activepieces
            kubectl --context prod describe statefulset activepieces-worker -n activepieces || true
            kubectl --context prod get events -n activepieces --sort-by='.lastTimestamp' | tail -30
            exit 1
          fi
          ENDSSH

  # --- WEEKLY RELEASE (runs on Sunday schedule or manual "weekly-release") ---

  weekly-release:
    needs: promote-to-production
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'weekly-release')
    runs-on: ubuntu-24.04
    steps:
      - name: Check if Sunday (skip on other days for scheduled runs)
        id: day-check
        run: |
          DAY=$(date -u +%u)  # 1=Monday ... 7=Sunday
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$DAY" != "7" ]; then
            echo "Not Sunday (day=$DAY). Skipping release."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.day-check.outputs.skip == 'false'

      - name: Set version from package.json
        if: steps.day-check.outputs.skip == 'false'
        id: version
        run: |
          RELEASE=$(node --print "require('./package.json').version")
          echo "release=$RELEASE" >> $GITHUB_OUTPUT

      - name: Fail if Docker tag already exists
        if: steps.day-check.outputs.skip == 'false'
        run: '! docker manifest inspect activepieces/activepieces:${{ steps.version.outputs.release }}'

      - name: Create or update changelog via release-drafter
        if: steps.day-check.outputs.skip == 'false'
        uses: release-drafter/release-drafter@v5
        with:
          commitish: main
          prerelease: false
          tag: ${{ steps.version.outputs.release }}
          name: ${{ steps.version.outputs.release }}
          version: ${{ steps.version.outputs.release }}
          latest: true
          publish: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create git tag
        if: steps.day-check.outputs.skip == 'false'
        run: |
          git tag -f ${{ steps.version.outputs.release }}
          git push origin ${{ steps.version.outputs.release }} --force

      - name: Login to Docker Hub
        if: steps.day-check.outputs.skip == 'false'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        if: steps.day-check.outputs.skip == 'false'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: depot/setup-action@v1
        if: steps.day-check.outputs.skip == 'false'

      - name: Build and push official release images
        if: steps.day-check.outputs.skip == 'false'
        uses: depot/build-push-action@v1
        with:
          project: du7O4b0e8P
          token: ${{ secrets.DEPOT_PROJECT_TOKEN }}
          context: .
          file: ./Dockerfile
          platforms: |
            linux/amd64
            linux/arm64
          push: true
          tags: |
            activepieces/activepieces:${{ steps.version.outputs.release }}
            activepieces/activepieces:latest
            ghcr.io/activepieces/activepieces:${{ steps.version.outputs.release }}
            ghcr.io/activepieces/activepieces:latest

  # Run smoke test after daily promotion to production
  smoke-test:
    needs: promote-to-production
    if: github.event_name == 'schedule'
    uses: ./.github/workflows/smoke-test.yml
    secrets: inherit

  # After promotion, deploy latest main to staging (catch-up for merges during freeze)
  catch-up-staging:
    needs: promote-to-production
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'promote-to-production')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger staging catch-up deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run continuous-delivery-k8s.yml \
            --repo ${{ github.repository }} \
            -f action=deploy-staging
