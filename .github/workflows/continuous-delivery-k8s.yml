name: Continuous Delivery — K8s (Hetzner)

on:
  push:
    branches: [main, feat/worker-v2]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - deploy-staging
          - deploy-staging-skip-freeze

jobs:
  check-freeze:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      frozen: ${{ steps.check.outputs.frozen }}
    steps:
      - name: Check staging freeze window (5 PM - 9 AM UTC)
        id: check
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" -ge 17 ] || [ "$HOUR" -lt 9 ]; then
            echo "Staging is frozen (current UTC hour: $HOUR). Skipping deploy."
            echo "frozen=true" >> $GITHUB_OUTPUT
          else
            echo "frozen=false" >> $GITHUB_OUTPUT
          fi

  build-image:
    needs: [check-freeze]
    if: |
      always() &&
      ((github.event_name == 'push' && needs.check-freeze.outputs.frozen == 'false') ||
       (github.event_name == 'workflow_dispatch' && (github.event.inputs.action == 'deploy-staging' || github.event.inputs.action == 'deploy-staging-skip-freeze')))
    runs-on: ubuntu-24.04
    concurrency:
      group: deploy-hetzner-build
      cancel-in-progress: true
    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Set image tag
        id: set-tag
        run: |
          RELEASE=$(node --print "require('./package.json').version")
          echo "image_tag=${RELEASE}.${{ github.sha }}.beta" >> $GITHUB_OUTPUT
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: depot/setup-action@v1
      - uses: depot/build-push-action@v1
        with:
          project: du7O4b0e8P
          token: ${{ secrets.DEPOT_PROJECT_TOKEN }}
          context: .
          file: ./Dockerfile
          platforms: |
            linux/amd64
            linux/arm64
          push: true
          no-cache: true
          tags: ghcr.io/activepieces/activepieces-cloud:${{ steps.set-tag.outputs.image_tag }}

  deploy-hetzner:
    needs: [check-freeze, build-image]
    if: always() && needs.build-image.result == 'success'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-hetzner
      cancel-in-progress: false   # never cancel mid-flight helm upgrade
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Update Helm dependencies                                                     
        run: helm dependency update deploy/activepieces-helm/

      - name: Install kubectl-argo-rollouts plugin
        run: |
          curl -fsSL https://github.com/argoproj/argo-rollouts/releases/latest/download/kubectl-argo-rollouts-linux-amd64 \
            -o /usr/local/bin/kubectl-argo-rollouts
          chmod +x /usr/local/bin/kubectl-argo-rollouts

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.HETZNER_KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy APP and WORKER
        run: |
          IMAGE_TAG=${{ needs.build-image.outputs.image_tag }}

          helm upgrade --install activepieces deploy/activepieces-helm/ \
            --namespace activepieces \
            --values deploy/staging/stg-app-values.yaml \
            --set image.tag=$IMAGE_TAG \
            --debug &
          APP_PID=$!

          helm upgrade --install activepieces-worker deploy/activepieces-helm/ \
            --namespace activepieces \
            --values deploy/staging/stg-worker-values.yaml \
            --set image.tag=$IMAGE_TAG \
            --debug &
          WORKER_PID=$!

          APP_EXIT=0; WORKER_EXIT=0
          wait $APP_PID    || APP_EXIT=$?
          wait $WORKER_PID || WORKER_EXIT=$?

          if [ $APP_EXIT -ne 0 ] || [ $WORKER_EXIT -ne 0 ]; then
            exit 1
          fi

      - name: Wait for preview pods to be healthy
        run: |
          wait_for_argo_rollout() {
            local name=$1
            local timeout=300
            local elapsed=0
            echo "Waiting for $name rollout..."
            while [ $elapsed -lt $timeout ]; do
              PHASE=$(kubectl get rollout "$name" -n activepieces \
                -o jsonpath='{.status.phase}' 2>/dev/null || echo "Unknown")
              [ -z "$PHASE" ] && PHASE="Unknown"
              echo "$name phase: $PHASE"
              case $PHASE in
                Paused|Healthy) return 0 ;;
                Degraded|Error|Aborted) echo "::error::$name rollout failed: $PHASE"; return 1 ;;
              esac
              sleep 10
              elapsed=$((elapsed + 10))
            done
            echo "::error::$name timed out after ${timeout}s (last phase: $PHASE)"
            return 1
          }

          APP_OK=0; WORKER_OK=0
          wait_for_argo_rollout activepieces || APP_OK=1
          kubectl rollout status statefulset/activepieces-worker -n activepieces --timeout=300s || WORKER_OK=1

          if [ $APP_OK -ne 0 ] || [ $WORKER_OK -ne 0 ]; then
            echo "--- Pod status ---"
            kubectl get pods -n activepieces
            echo "--- Rollout details ---"
            kubectl argo rollouts get rollout activepieces -n activepieces || true
            kubectl describe statefulset activepieces-worker -n activepieces || true
            echo "--- Events ---"
            kubectl get events -n activepieces --sort-by='.lastTimestamp' | tail -30
            kubectl argo rollouts abort activepieces -n activepieces || true
            exit 1
          fi

      - name: Promote APP
        run: |
          kubectl argo rollouts promote activepieces -n activepieces

      - name: Wait for promotion to complete
        run: |
          kubectl argo rollouts status activepieces -n activepieces --timeout=5m
