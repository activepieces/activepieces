name: Chat Evals

# Regression gate for the AI Copilot chat prompt + agent loop. Runs on PRs that touch
# chat/prompt/eval files: deterministic replay + transcript-assertion tests. No provider
# key, so the live LLM-judge suite self-skips (describe.skipIf in chat-eval.test.ts).

on:
  pull_request:
    paths:
      - packages/server/worker/src/lib/execute/jobs/ee/chat/**
      - packages/server/worker/test/lib/chat-eval/**
      - packages/server/api/src/app/ee/chat/**
      - packages/server/api/src/assets/prompts/**
      - packages/core/shared/src/lib/ee/chat/**
      - .github/workflows/chat-evals.yml

permissions:
  actions: read
  contents: read

jobs:
  gate:
    name: Deterministic gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      # The eval tests import @activepieces/* packages by their built dist/, which
      # bun install alone does not produce.
      - name: Build worker dependency graph
        run: npx turbo run build --filter=worker

      - name: Run deterministic chat evals
        run: npm run chat-evals:ci
