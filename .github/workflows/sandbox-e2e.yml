name: Sandbox netns e2e

on:
  pull_request:
    paths:
      - 'packages/server/worker/src/lib/egress/**'
      - 'packages/server/worker/src/lib/sandbox/**'
      - 'packages/server/worker/test/e2e/**'
      - 'scripts/run-sandbox-e2e.sh'
      - '.github/workflows/sandbox-e2e.yml'

permissions:
  contents: read

jobs:
  netns-e2e:
    # GitHub-hosted ubuntu runners support privileged docker (needed for isolate +
    # netns/veth: CAP_SYS_ADMIN + CAP_NET_ADMIN). Run only the deterministic netns
    # suites — they need NO internet, so they are required-but-fast and never flake on
    # connectivity. The connectivity-dependent sandbox-real-third-party suite is
    # intentionally excluded so third-party outages can't fail this build.
    runs-on: ubuntu-latest
    if: github.repository == 'activepieces/activepieces'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Run deterministic sandbox netns e2e suites (privileged docker)
        run: |
          bash scripts/run-sandbox-e2e.sh \
            sandbox-egress.e2e.test.ts \
            sandbox-engine-ssrf.e2e.test.ts \
            sandbox-rpc-netns.e2e.test.ts \
            sandbox-concurrency-netns.e2e.test.ts \
            sandbox-netns-lifecycle.e2e.test.ts \
            sandbox-egress-completeness.e2e.test.ts \
            egress-proxy.e2e.test.ts
