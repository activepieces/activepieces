# ============================================================================
# Activepieces — Staging APP (Hetzner)
#   helm upgrade --install activepieces deploy/activepieces-helm/ \
#     --values deploy/staging/stg-app-values.yaml \
#     --set image.tag=<tag>
# ============================================================================

replicaCount: 2

image:
  repository: ghcr.io/activepieces/activepieces-cloud
  tag: "0.79.2.a45aa3e55fa2edb3acf4528012534b769f23b61d.beta"       # reference only — CI always overrides via --set image.tag=
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-pull-secret

activepieces:
  edition: "cloud"
  executionMode: "SANDBOXED"
  containerType: "APP"
  environment: "prod"
  logLevel: "info"
  logPretty: false
  enableFlowOnPublish: true
  telemetryEnabled: true
  frontendUrl: "https://stg.activepieces.dev"
  # SMTP configuration
  smtp:
    enabled: true
    host: "smtp.gmail.com"
    port: 587
    externalSecret:
      name: "activepieces-smtp-secret"
      usernameKey: "username"
      passwordKey: "password"

  apiKeySecret:
    externalSecret:
      name: "activepieces-api-key"
      key: "api-key"
  workerToken:
    externalSecret:
      name: "activepieces-worker-token"
      key: "worker-token"
  encryptionKey:
    externalSecret:
      name: "activepieces-secrets"
      key: "encryption-key"
  jwtSecret:
    externalSecret:
      name: "activepieces-jwt-secret"
      key: "jwt-secret"


# External PostgreSQL (bundled subchart disabled)
postgresql:
  enabled: false
  useSSL: true
  sslCaSecret:
    externalSecret:
      name: "activepieces-db-ssl-ca"
      key: "ssl-ca"
  externalSecret:
    name: "activepieces-db-secret"
    hostKey: "host"
    portKey: "port"
  auth:
    database: "ap-pool"
    username: "ap"
    externalSecret:
      name: "activepieces-db-secret"
      key: "password"

# External Redis (bundled subchart disabled)
redis:
  enabled: false
  type: "standalone"
  useSSL: true
  externalSecret:
    name: "activepieces-redis-secret"
    hostKey: "host"
    portKey: "port"
  auth:
    enabled: true
    externalSecret:
      name: "activepieces-redis-secret"
      key: "password"

# JWT and encryption keys managed added in external secrets
kubernetes-secret-generator:
  enabled: false

# S3 file storage
s3:
  enabled: true
  useSignedUrls: true
  bucket: "ap-files-dev"
  region: "us-east-1"
  endpoint: "https://1c441b119970086c90b78ad3be4a478f.r2.cloudflarestorage.com"
  externalSecret:
    name: "activepieces-s3-secret"
    accessKeyIdKey: "accessKeyId"
    secretAccessKeyKey: "secretAccessKey"

# Stripe billing
stripe:
  enabled: true
  externalSecret:
    name: "activepieces-stripe-secret"
    secretKeyKey: "secretKey"
    webhookSecretKey: "webhookSecret"

# nginx-ingress with cert-manager TLS
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  hosts:
    - host: stg.activepieces.dev
      paths:
        - path: /
          pathType: Prefix
    - host: "fallback.activepieces.dev"
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: activepieces-tls
      hosts:
        - stg.activepieces.dev

queueUi:
  enabled: true
  username: "admin"
  password: "Kx9mP4vR7nWq2sYd"

rollout:
  blueGreen:
    autoPromotionEnabled: false
    scaleDownDelaySeconds: 30

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /api/v1/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

autoscaling:
  enabled: false

persistence:
  enabled: false

nodeSelector:
  role: app

resources:
  requests:
    cpu: "1"
    memory: "2Gi"
  limits:
    cpu: "1"
    memory: "2Gi"
