# ============================================================================
# Activepieces — Staging APP (Hetzner)
#   helm upgrade --install activepieces deploy/activepieces-helm/ \
#     --values deploy/staging/stg-app-values.yaml \
#     --set image.tag=<tag> \
#     --force-conflicts
# ============================================================================

replicaCount: 2

image:
  repository: ghcr.io/activepieces/activepieces-cloud
  tag: "0.79.2.5224e3c80d9916785eb43a66e50f4e925dd2a650.beta"       # reference only — CI always overrides via --set image.tag=
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-pull-secret

# nginx-ingress with cert-manager TLS
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  hosts:
    - host: stg.activepieces.dev
      paths:
        - path: /
          pathType: Prefix
    - host: "fallback.activepieces.dev"
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: activepieces-tls
      hosts:
        - stg.activepieces.dev


rollout:
  blueGreen:
    autoPromotionEnabled: false
    scaleDownDelaySeconds: 30

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /v1/health
    port: 3000        # probe Node.js directly — avoids nginx IPv6 upstream flapping (502s)
  initialDelaySeconds: 5
  periodSeconds: 5

autoscaling:
  enabled: false

persistence:
  enabled: false

nodeSelector:
  role: app

activepiecesConfig:
  AP_CONTAINER_TYPE: APP

resources:
  requests:
    cpu: "1"
    memory: "2Gi"
  limits:
    cpu: "1"
    memory: "2Gi"
