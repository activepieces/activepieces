# ============================================================================
# Activepieces — Staging APP (Hetzner)
#   helm upgrade --install activepieces deploy/activepieces-helm/ \
#     --values deploy/staging/stg-app-values.yaml \
#     --set image.tag=<tag>
# ============================================================================

replicaCount: 4

image:
  repository: ghcr.io/activepieces/activepieces-cloud
  tag: "0.79.2"       # reference only — CI always overrides via --set image.tag=
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-pull-secret

activepieces:
  edition: "ce"
  executionMode: "UNSANDBOXED"
  containerType: "APP"
  clusterMode: true
  environment: "prod"
  logLevel: "info"
  logPretty: false
  enableFlowOnPublish: true
  telemetryEnabled: true
  frontendUrl: "https://stg.activepieces.dev"

# External PostgreSQL (bundled subchart disabled)
postgresql:
  enabled: false
  port: 5432
  useSSL: false
  host: "10.0.1.4"
  auth:
    database: "activepieces"
    username: "postgres"
    externalSecret:
      name: "activepieces-db-secret"
      key: "password"

# External Redis (bundled subchart disabled)
redis:
  enabled: false
  port: 6379
  type: "standalone"
  host: "10.0.1.5"
  auth:
    enabled: true
    externalSecret:
      name: "activepieces-redis-secret"
      key: "password"

# JWT and encryption keys managed by kubernetes-secret-generator subchart
kubernetes-secret-generator:
  enabled: true

# S3 file storage
s3:
  enabled: true
  useSignedUrls: true
  bucket: "activepiecesstagingbucket"
  region: "eu-central-1"
  endpoint: "https://fsn1.your-objectstorage.com"
  externalSecret:
    name: "activepieces-s3-secret"
    accessKeyIdKey: "accessKeyId"
    secretAccessKeyKey: "secretAccessKey"

# nginx-ingress with cert-manager TLS
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: stg.activepieces.dev
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: activepieces-tls
      hosts:
        - stg.activepieces.dev

autoscaling:
  enabled: false

persistence:
  enabled: true
  size: 5Gi

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "1"
    memory: "2Gi"
