# ============================================================================
# Activepieces — Staging APP (Hetzner)
#   helm upgrade --install activepieces deploy/activepieces-helm/ \
#     --values deploy/staging/stg-app-values.yaml \
#     --set image.tag=<tag>
# ============================================================================

replicaCount: 4

image:
  repository: ghcr.io/activepieces/activepieces-cloud
  tag: "0.79.2.1fa2a3b0e8924609d308d0ede8ff7c8f40aeeb68.beta"       # reference only — CI always overrides via --set image.tag=
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-pull-secret

activepieces:
  edition: "cloud"
  executionMode: "SANDBOXED"
  containerType: "APP"
  environment: "prod"
  logLevel: "info"
  logPretty: false
  enableFlowOnPublish: true
  telemetryEnabled: true
  frontendUrl: "https://stg.activepieces.dev"


# External PostgreSQL (bundled subchart disabled)
postgresql:
  enabled: false
  port: 5432
  useSSL: false
  host: "10.0.1.4"
  auth:
    database: "activepieces"
    username: "postgres"
    externalSecret:
      name: "activepieces-db-secret"
      key: "password"

# External Redis (bundled subchart disabled)
redis:
  enabled: false
  port: 6379
  type: "standalone"
  host: "10.0.1.5"
  auth:
    enabled: true
    externalSecret:
      name: "activepieces-redis-secret"
      key: "password"

# JWT and encryption keys managed by kubernetes-secret-generator subchart
kubernetes-secret-generator:
  enabled: true

# S3 file storage
s3:
  enabled: true
  useSignedUrls: true
  bucket: "activepiecesstagingbucket"
  region: "eu-central-1"
  endpoint: "https://fsn1.your-objectstorage.com"
  externalSecret:
    name: "activepieces-s3-secret"
    accessKeyIdKey: "accessKeyId"
    secretAccessKeyKey: "secretAccessKey"

# Stripe billing
stripe:
  enabled: true
  externalSecret:
    name: "activepieces-stripe-secret"
    secretKeyKey: "secretKey"
    webhookSecretKey: "webhookSecret"

# nginx-ingress with cert-manager TLS
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  hosts:
    - host: stg.activepieces.dev
      paths:
        - path: /
          pathType: Prefix
    - host: "fallback.activepieces.dev"
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: activepieces-tls
      hosts:
        - stg.activepieces.dev

queueUi:
  enabled: true
  username: "admin"
  password: "Kx9mP4vR7nWq2sYd"

rollout:
  blueGreen:
    autoPromotionEnabled: false
    scaleDownDelaySeconds: 30

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /api/v1/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

autoscaling:
  enabled: false

persistence:
  enabled: false

nodeSelector:
  role: app

resources:
  requests:
    cpu: "1"
    memory: "2Gi"
  limits:
    cpu: "1"
    memory: "2Gi"
