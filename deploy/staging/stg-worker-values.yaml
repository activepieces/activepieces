# ============================================================================
# Activepieces — Staging WORKER (Hetzner)
#   helm upgrade --install activepieces-worker deploy/activepieces-helm/ \
#     --values deploy/staging/stg-worker-values.yaml \
#     --set image.tag=<tag>
# ============================================================================

workloadType: statefulset

replicaCount: 2

podManagementPolicy: Parallel

image:
  repository: ghcr.io/activepieces/activepieces-cloud
  tag: "0.79.2.a45aa3e55fa2edb3acf4528012534b769f23b61d.beta"       # reference only — CI always overrides via --set image.tag=
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-pull-secret

activepieces:
  edition: "cloud"
  executionMode: "SANDBOXED"
  containerType: "WORKER"
  environment: "prod"
  logLevel: "info"
  logPretty: false
  frontendUrl: "https://stg.activepieces.dev"
  # Workers share JWT, encryption keys and worker token with the APP release
  workerToken:
    externalSecret:
      name: "activepieces-worker-token"
      key: "worker-token"
  encryptionKey:
    externalSecret:
      name: "activepieces-secrets"
      key: "encryption-key"
  jwtSecret:
    externalSecret:
      name: "activepieces-jwt-secret"
      key: "jwt-secret"

# External PostgreSQL (bundled subchart disabled)
postgresql:
  enabled: false
  useSSL: false
  externalSecret:
    name: "activepieces-db-secret"
    hostKey: "host"
    portKey: "port"
  auth:
    database: "ap-pool"
    username: "ap"
    externalSecret:
      name: "activepieces-db-secret"
      key: "password"

# External Redis (bundled subchart disabled)
redis:
  enabled: false
  type: "standalone"
  externalSecret:
    name: "activepieces-redis-secret"
    hostKey: "host"
    portKey: "port"
  auth:
    enabled: true
    externalSecret:
      name: "activepieces-redis-secret"
      key: "password"

# Workers do not generate their own secrets (use APP's)
kubernetes-secret-generator:
  enabled: false

# S3 file storage (same bucket as APP)
s3:
  enabled: true
  useSignedUrls: true
  bucket: "ap-files-dev"
  region: "us-east-1"
  endpoint: "https://1c441b119970086c90b78ad3be4a478f.r2.cloudflarestorage.com"
  externalSecret:
    name: "activepieces-s3-secret"
    accessKeyIdKey: "accessKeyId"
    secretAccessKeyKey: "secretAccessKey"

stripe:
  enabled: false

# Workers are not exposed externally
ingress:
  enabled: false

# Workers don't serve HTTP — disable HTTP health checks
livenessProbe: null
readinessProbe: null

# Privileged access required for sandboxed flow execution (Docker-in-Docker)
securityContext:
  privileged: true

volumeMounts:
  - name: docker-sock
    mountPath: /var/run/docker.sock

volumes:
  - name: docker-sock
    hostPath:
      path: /var/run/docker.sock
      type: Socket

autoscaling:
  enabled: false

persistence:
  enabled: true
  size: 15Gi

nodeSelector:
  role: worker

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "500m"
    memory: "1Gi"
