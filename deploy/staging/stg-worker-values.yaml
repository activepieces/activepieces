# ============================================================================
# Activepieces — Staging WORKER (Hetzner)
#   helm upgrade --install activepieces-worker deploy/activepieces-helm/ \
#     --values deploy/staging/stg-worker-values.yaml \
#     --set image.tag=<tag>
# ============================================================================

replicaCount: 4

image:
  repository: ghcr.io/activepieces/activepieces-cloud
  tag: "0.79.2"       # reference only — CI always overrides via --set image.tag=
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-pull-secret

activepieces:
  edition: "ce"
  executionMode: "UNSANDBOXED"
  containerType: "WORKER"
  clusterMode: true
  environment: "prod"
  logLevel: "info"
  logPretty: false
  # Workers share JWT and encryption keys with the APP release
  jwtSecretName: "activepieces-jwt-secret"
  encryptionSecretName: "activepieces-secrets"
  # Workers connect to APP via internal K8s service name
  frontendUrl: "http://activepieces"
  internalUrl: "http://activepieces"

# External PostgreSQL (bundled subchart disabled)
postgresql:
  enabled: false
  port: 5432
  useSSL: false
  host: "10.0.1.4"
  auth:
    database: "activepieces"
    username: "postgres"
    externalSecret:
      name: "activepieces-db-secret"
      key: "password"

# External Redis (bundled subchart disabled)
redis:
  enabled: false
  port: 6379
  type: "standalone"
  host: "10.0.1.5"
  auth:
    enabled: true
    externalSecret:
      name: "activepieces-redis-secret"
      key: "password"

# Workers do not generate their own secrets (use APP's)
kubernetes-secret-generator:
  enabled: false

# S3 file storage (same bucket as APP)
s3:
  enabled: true
  useSignedUrls: true
  bucket: "activepiecesstagingbucket"
  region: "eu-central-1"
  endpoint: "https://fsn1.your-objectstorage.com"
  externalSecret:
    name: "activepieces-s3-secret"
    accessKeyIdKey: "accessKeyId"
    secretAccessKeyKey: "secretAccessKey"

# Workers are not exposed externally
ingress:
  enabled: false

# Workers don't serve HTTP — disable HTTP health checks
livenessProbe: {}
readinessProbe: {}

# Privileged access required for sandboxed flow execution (Docker-in-Docker)
securityContext:
  privileged: true

volumeMounts:
  - name: docker-sock
    mountPath: /var/run/docker.sock

volumes:
  - name: docker-sock
    hostPath:
      path: /var/run/docker.sock
      type: Socket

autoscaling:
  enabled: false

persistence:
  enabled: true
  size: 5Gi

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "500m"
    memory: "1Gi"
