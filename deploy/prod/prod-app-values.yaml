# ============================================================================
# Activepieces — Production APP (Hetzner)
#   helm upgrade --install activepieces deploy/activepieces-helm/ \
#     --values deploy/prod/prod-app-values.yaml \
#     --set image.tag=<tag> \
#     --force-conflicts
# ============================================================================

replicaCount: 4

image:
  repository: ghcr.io/activepieces/activepieces-cloud
  tag: "0.79.2.a45aa3e55fa2edb3acf4528012534b769f23b61d.beta"       # reference only — CI always overrides via --set image.tag=
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-pull-secret

# nginx-ingress with cert-manager TLS
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  hosts:
    - host: prod.activepieces.dev
      paths:
        - path: /
          pathType: Prefix
    - host: cloud.activepieces.com
      paths:
        - path: /
          pathType: Prefix
    - host: platform.flowzues.com
      paths:
        - path: /
          pathType: Prefix
    - host: workflow-builder.mekari.com
      paths:
        - path: /
          pathType: Prefix
    - host: app.forma-sync.com
      paths:
        - path: /
          pathType: Prefix
    - host: flows.logixx.io
      paths:
        - path: /
          pathType: Prefix
    - host: app.digiforma-sync.com
      paths:
        - path: /
          pathType: Prefix
    - host: bloomfilter.activepieces.com
      paths:
        - path: /
          pathType: Prefix
    - host: handbid.activepieces.com
      paths:
        - path: /
          pathType: Prefix
    - host: app.flowzy.ai
      paths:
        - path: /
          pathType: Prefix
    - host: workflow.synthflow.ai
      paths:
        - path: /
          pathType: Prefix
    - host: pricehubble.activepieces.com
      paths:
        - path: /
          pathType: Prefix
    - host: workflow-agents.bestbrain.ai
      paths:
        - path: /
          pathType: Prefix
    - host: automate.ezily.io
      paths:
        - path: /
          pathType: Prefix
    - host: hooks.aicalllab.com
      paths:
        - path: /
          pathType: Prefix
    - host: workflows.moffin.mx
      paths:
        - path: /
          pathType: Prefix
    - host: fleetio.activepieces.com
      paths:
        - path: /
          pathType: Prefix
    ### Internal
    - host: app.passr.dev
      paths:
        - path: /
          pathType: Prefix
    - host: beaver.passr.dev
      paths:
        - path: /
          pathType: Prefix
    - host: quick.activepieces.com
      paths:
        - path: /
          pathType: Prefix
    ## Free (Friends)
    - host: lucidya.activepieces.com
      paths:
        - path: /
