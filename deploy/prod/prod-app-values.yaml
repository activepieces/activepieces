          pathType: Prefix
  tls:
    - secretName: activepieces-tls
      hosts:
        - prod.activepieces.dev

rollout:
  blueGreen:
    autoPromotionEnabled: false
    scaleDownDelaySeconds: 30

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /v1/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

autoscaling:
  enabled: false

persistence:
  enabled: false

nodeSelector:
  role: app

activepiecesConfig:
  AP_CONTAINER_TYPE: APP

resources:
  requests:
    cpu: "1"
    memory: "8Gi"
  limits:
    cpu: "1"
    memory: "8Gi"
