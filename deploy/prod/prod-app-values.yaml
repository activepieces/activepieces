    - host: cognida-partner.activepieces.com
      paths:
        - path: /
          pathType: Prefix
    - host: shakudo.activepieces.com
      paths:
        - path: /
          pathType: Prefix
    ### Trial
    - host: skyswitch.activepieces.com
      paths:
        - path: /
          pathType: Prefix
    - host: myob.activepieces.com
