# ============================================================================
# Activepieces — Production WORKER (Hetzner)
#   helm upgrade --install activepieces-worker deploy/activepieces-helm/ \
#     --values deploy/prod/prod-worker-values.yaml \
#     --set image.tag=<tag>
# ============================================================================

workloadType: statefulset

replicaCount: 2

podManagementPolicy: Parallel

image:
  repository: ghcr.io/activepieces/activepieces-cloud
  tag: "0.79.2.a45aa3e55fa2edb3acf4528012534b769f23b61d.beta"       # reference only — CI always overrides via --set image.tag=
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-pull-secret

# Workers are not exposed externally
ingress:
  enabled: false

# Workers don't serve HTTP — disable HTTP health checks
livenessProbe: null
readinessProbe: null

# Privileged access required for sandboxed flow execution (Docker-in-Docker)
securityContext:
  privileged: true

volumeMounts:
  - name: docker-sock
    mountPath: /var/run/docker.sock

volumes:
  - name: docker-sock
    hostPath:
      path: /var/run/docker.sock
      type: Socket

autoscaling:
  enabled: false

persistence:
  enabled: true
  size: 15Gi

nodeSelector:
  role: worker

activepiecesConfig:
  AP_CONTAINER_TYPE: WORKER

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "500m"
    memory: "1Gi"
