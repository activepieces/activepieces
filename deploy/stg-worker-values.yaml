# ============================================================================
# Activepieces — Cloud-agnostic staging base (WORKER)
# Apply before cloud-specific overrides:
#   helm upgrade --install activepieces-worker deploy/activepieces-helm/ \
#     --values deploy/stg-worker-values.yaml \
#     --values deploy/stg-hetzner-worker-values.yaml
# ============================================================================

replicaCount: 3

image:
  repository: ghcr.io/activepieces/activepieces-cloud
  tag: "0.79.2"       # reference only — CI always overrides via --set image.tag=
  pullPolicy: Always  # always pull so new digests are fetched even on same tag

imagePullSecrets:
  - name: ghcr-pull-secret

activepieces:
  edition: "ce"
  executionMode: "UNSANDBOXED"
  containerType: "WORKER"
  clusterMode: true
  environment: "prod"
  logLevel: "info"
  logPretty: false
  # Workers share JWT and encryption keys with the APP release
  # These secret names must match what the APP release generated
  jwtSecretName: "activepieces-jwt-secret"
  encryptionSecretName: "activepieces-secrets"
  # frontendUrl set in cloud-specific override (internal K8s URL)

# External PostgreSQL (bundled subchart disabled)
postgresql:
  enabled: false
  port: 5432
  useSSL: false
  auth:
    database: "activepieces"
    username: "postgres"
    externalSecret:
      name: "activepieces-db-secret"
      key: "password"
  # host set in cloud-specific override

# External Redis (bundled subchart disabled)
redis:
  enabled: false
  port: 6379
  type: "standalone"
  auth:
    enabled: true
    externalSecret:
      name: "activepieces-redis-secret"
      key: "password"
  # host set in cloud-specific override

# Workers do not generate their own secrets (use APP's)
kubernetes-secret-generator:
  enabled: false

# S3 file storage (same bucket as APP)
s3:
  enabled: true
  useSignedUrls: true
  # bucket, region, credentials set in cloud-specific override

# Workers are not exposed externally
ingress:
  enabled: false

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

persistence:
  enabled: true
  size: 5Gi

# Workers need more CPU/memory for flow execution
resources:
  requests:
    cpu: "1"
    memory: "1Gi"
  limits:
    cpu: "4"
    memory: "4Gi"
