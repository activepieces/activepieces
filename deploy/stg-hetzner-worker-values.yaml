# ============================================================================
# Activepieces — Hetzner-specific overrides (WORKER)
# Applied on top of prod-worker-values.yaml:
#   helm upgrade --install activepieces-worker deploy/activepieces-helm/ \
#     --values deploy/prod-worker-values.yaml \
#     --values deploy/prod-hetzner-worker-values.yaml
#
# Fill in values from: terraform -chdir=deploy/terraform/hetzner output
# ============================================================================

activepieces:
  # Workers connect to APP via internal K8s service name (no external DNS needed)
  frontendUrl: "http://activepieces"

postgresql:
  host: "10.0.1.4"   # private IP of PostgreSQL VM (static)

redis:
  host: "10.0.1.5"   # private IP of Redis VM

s3:
  bucket: "activepiecesstagingbucket"
  region: "eu-central-1"
  endpoint: "https://fsn1.your-objectstorage.com"
  externalSecret:
    name: "activepieces-s3-secret"
    accessKeyIdKey: "accessKeyId"
    secretAccessKeyKey: "secretAccessKey"
