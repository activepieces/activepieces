services:
  app:
    image: ghcr.io/sameerzahiddd/activepieces:latest
    platform: linux/amd64
    container_name: activepieces-app
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      - postgres
      - redis
    env_file: .env
    environment:
      - AP_CONTAINER_TYPE=APP
      - OTOM8_DISABLE_NATIVE_AUTH=true
      - DEPLOY_ENV=prod
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - AP_SIGNING_KEY_ID=${AP_SIGNING_KEY_ID}
      - AP_SIGNING_KEY_PRIVATE=${AP_SIGNING_KEY_PRIVATE}
    volumes:
      - ./cache:/usr/src/app/cache
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./theme-patched.js:/usr/src/app/packages/server/api/dist/src/app/flags/theme.js:ro
    networks:
      - activepieces
    mem_limit: 800m
  worker:
    image: ghcr.io/sameerzahiddd/activepieces:latest
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      - app
    env_file: .env
    environment:
      - AP_CONTAINER_TYPE=WORKER
      - AP_FRONTEND_URL=http://activepieces-app
      - OTOM8_DISABLE_NATIVE_AUTH=true
      - DEPLOY_ENV=prod
      - AP_SANDBOX_MEMORY_LIMIT=262144
      - AP_TRIGGER_TIMEOUT_SECONDS=20
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1200m
    volumes:
      - ./cache:/usr/src/app/cache
    networks:
      - activepieces
  postgres:
    image: 'pgvector/pgvector:0.8.0-pg14'
    container_name: postgres
    restart: unless-stopped
    env_file: .env
    environment:
      - 'POSTGRES_DB=${AP_POSTGRES_DATABASE}'
      - 'POSTGRES_PASSWORD=${AP_POSTGRES_PASSWORD}'
      - 'POSTGRES_USER=${AP_POSTGRES_USERNAME}'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - activepieces
    mem_limit: 512m
  redis:
    image: 'redis:7.0.7'
    container_name: redis
    restart: unless-stopped
    volumes:
      - 'redis_data:/data'
    networks:
      - activepieces
    mem_limit: 256m
volumes:
  postgres_data:
  redis_data:
networks:
  activepieces:
