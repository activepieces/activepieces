# Load balancer for the max-throughput rig. The default benchmark nginx uses `upstream { server app:80; }`
# which Docker resolves to ONE replica IP at startup → all traffic pins to one app (the "app-1 hot"
# bug). Here we use the Docker DNS resolver + a variable in proxy_pass so the name is re-resolved per
# request → even round-robin across all replicas. Port 80 fronts the app tier; port 8081 fronts the
# pool tier (the worker points AP_POOL_SERVER_URL at nginx:8081).
events { worker_connections 16384; }

http {
    resolver 127.0.0.11 valid=1s ipv6=off;
    map $http_upgrade $connection_upgrade { default upgrade; '' close; }

    server {
        listen 80;
        location / {
            set $app_backend http://app:80;
            proxy_pass $app_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 900s;
            proxy_send_timeout 900s;
            proxy_buffering off;
            proxy_cache off;
        }
    }

    server {
        listen 8081;
        location / {
            set $pool_backend http://poolserver:8080;
            proxy_pass $pool_backend;
            proxy_http_version 1.1;
            proxy_read_timeout 900s;
            proxy_send_timeout 900s;
            proxy_buffering off;
        }
    }
}
