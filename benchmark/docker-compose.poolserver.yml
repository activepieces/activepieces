# Stage A: validate the GCP_CLOUD_RUN runtime against a LOCAL pool-server container.
# The worker talks to the pool over http://poolserver:8080; the pool reaches the app for piece
# bundles + engine callbacks via the provision's publicApiUrl (http://nginx:80), which is on this
# same docker network — so no public tunnel is needed here (that is only for real Cloud Run).
services:
  poolserver:
    image: ap-poolserver:local
    environment:
      AP_POOL_SERVER_TOKEN: bench-pool-secret
      AP_CACHE_BASE_PATH: /usr/src/app/cache
      AP_LOG_LEVEL: info
      PORT: 8080
    networks:
      - bench

  worker:
    environment:
      AP_RUNTIME: GCP_CLOUD_RUN
      AP_POOL_SERVER_URL: http://poolserver:8080
      AP_POOL_SERVER_TOKEN: bench-pool-secret
    depends_on:
      - poolserver
