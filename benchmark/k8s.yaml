# Full Activepieces stack on GKE for the max-throughput benchmark.
# Tiers: postgres + redis (in-cluster, ephemeral) | minio (S3 + signed URLs) | app (N) | worker (M) |
# poolserver (P, the sandbox pool). The worker talks to the pool via the k8s Service `poolserver`;
# engine callbacks go to the app Service. External webhook traffic enters via the app LoadBalancer.
apiVersion: v1
kind: ConfigMap
metadata: { name: ap-config }
data:
  AP_POSTGRES_DATABASE: activepieces
  AP_POSTGRES_USERNAME: postgres
  AP_POSTGRES_PASSWORD: password
  AP_POSTGRES_HOST: postgres
  AP_POSTGRES_PORT: "5432"
  AP_REDIS_HOST: redis
  AP_REDIS_PORT: "6379"
  AP_JWT_SECRET: benchmark-secret-key-for-testing
  AP_ENCRYPTION_KEY: 11020ebf480a9b1648ceec6400beaf26
  AP_ENVIRONMENT: prod
  AP_TELEMETRY_ENABLED: "false"
  AP_LOG_LEVEL: error
  AP_FRONTEND_URL: http://app:80
  AP_EXECUTION_MODE: SANDBOX_CODE_ONLY
  AP_DEFAULT_CONCURRENT_JOBS_LIMIT: "1000"
  AP_PROJECT_RATE_LIMITER_ENABLED: "false"
  AP_FILE_STORAGE_LOCATION: S3
  AP_S3_BUCKET: activepieces
  AP_S3_ACCESS_KEY_ID: minioadmin
  AP_S3_SECRET_ACCESS_KEY: minioadmin
  AP_S3_ENDPOINT: http://minio:9000
  AP_S3_REGION: us-east-1
  AP_S3_USE_SIGNED_URLS: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: postgres }
spec:
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata: { labels: { app: postgres } }
    spec:
      containers:
        - name: postgres
          image: postgres:14.4
          env:
            - { name: POSTGRES_DB, value: activepieces }
            - { name: POSTGRES_USER, value: postgres }
            - { name: POSTGRES_PASSWORD, value: password }
          ports: [{ containerPort: 5432 }]
          resources: { requests: { cpu: "500m", memory: 512Mi } }
          volumeMounts: [{ name: data, mountPath: /var/lib/postgresql/data }]
      volumes: [{ name: data, emptyDir: {} }]
---
apiVersion: v1
kind: Service
metadata: { name: postgres }
spec:
  selector: { app: postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: redis }
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata: { labels: { app: redis } }
    spec:
      containers:
        - name: redis
          image: redis:7.0.7
          ports: [{ containerPort: 6379 }]
          resources: { requests: { cpu: "250m", memory: 256Mi } }
---
apiVersion: v1
kind: Service
metadata: { name: redis }
spec:
  selector: { app: redis }
  ports: [{ port: 6379, targetPort: 6379 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: minio }
spec:
  replicas: 1
  selector: { matchLabels: { app: minio } }
  template:
    metadata: { labels: { app: minio } }
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-09-22T00-33-43Z
          args: ["server", "/data"]
          env:
            - { name: MINIO_ROOT_USER, value: minioadmin }
            - { name: MINIO_ROOT_PASSWORD, value: minioadmin }
          ports: [{ containerPort: 9000 }]
          resources: { requests: { cpu: "250m", memory: 256Mi } }
          volumeMounts: [{ name: data, mountPath: /data }]
      volumes: [{ name: data, emptyDir: {} }]
---
apiVersion: v1
kind: Service
metadata: { name: minio }
spec:
  selector: { app: minio }
  ports: [{ port: 9000, targetPort: 9000 }]
---
apiVersion: batch/v1
kind: Job
metadata: { name: minio-init }
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:RELEASE.2024-09-16T17-43-14Z
          command: ["/bin/sh", "-c", "until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 2; done && mc mb --ignore-existing local/activepieces && echo bucket-ready"]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: poolserver }
spec:
  replicas: 4
  selector: { matchLabels: { app: poolserver } }
  template:
    metadata: { labels: { app: poolserver } }
    spec:
      containers:
        - name: poolserver
          image: europe-west1-docker.pkg.dev/activepieces-b3803/poolserver/poolserver:latest
          env:
            - { name: AP_POOL_SERVER_TOKEN, value: ap-pool-server-4f1c9a7e2b6d4f0a8c3e5d7b9a1f3c2e }
            - { name: AP_POOL_CONCURRENCY, value: "8" }
            - { name: AP_CACHE_BASE_PATH, value: /tmp/cache }
            - { name: AP_LOG_LEVEL, value: error }
            - { name: PORT, value: "8080" }
          ports: [{ containerPort: 8080 }]
          resources: { requests: { cpu: "1", memory: 1Gi } }
---
apiVersion: v1
kind: Service
metadata: { name: poolserver }
spec:
  selector: { app: poolserver }
  ports: [{ port: 8080, targetPort: 8080 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: app }
spec:
  replicas: 4
  selector: { matchLabels: { app: app } }
  template:
    metadata: { labels: { app: app } }
    spec:
      containers:
        - name: app
          image: europe-west1-docker.pkg.dev/activepieces-b3803/poolserver/ap-app:latest
          envFrom: [{ configMapRef: { name: ap-config } }]
          env:
            - { name: AP_CONTAINER_TYPE, value: APP }
            - { name: AP_PORT, value: "80" }
          ports: [{ containerPort: 80 }]
          resources: { requests: { cpu: "500m", memory: 1Gi } }
          readinessProbe:
            httpGet: { path: /api/v1/flags, port: 80 }
            initialDelaySeconds: 20
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata: { name: app }
spec:
  type: LoadBalancer
  selector: { app: app }
  ports: [{ port: 80, targetPort: 80 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: worker }
spec:
  replicas: 3
  selector: { matchLabels: { app: worker } }
  template:
    metadata: { labels: { app: worker } }
    spec:
      containers:
        - name: worker
          image: europe-west1-docker.pkg.dev/activepieces-b3803/poolserver/ap-app:latest
          envFrom: [{ configMapRef: { name: ap-config } }]
          env:
            - { name: AP_CONTAINER_TYPE, value: WORKER }
            - { name: AP_RUNTIME, value: GCP_CLOUD_RUN }
            - { name: AP_POOL_SERVER_URL, value: http://poolserver:8080 }
            - { name: AP_WORKER_CONCURRENCY, value: "100" }
          resources: { requests: { cpu: "500m", memory: 1Gi } }
