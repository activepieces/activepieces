# Stage B: the worker AUTO-PROVISIONS a real Cloud Run pool server (deploys it from the AR image on
# first execute) and talks to it over HTTPS. The Cloud Run engine reaches the local app over the
# cloudflared tunnel (dev.layan.ai -> localhost:8080 -> nginx). The app's PUBLIC_URL is the tunnel, so
# the worker hands the engine a publicly-reachable publicApiUrl + internalApiUrl. The worker itself
# keeps its own app connection local (FRONTEND_URL=nginx) so it consumes jobs reliably. The only GCP
# config is the mounted ADC key; project is auto-detected from it and region defaults to europe-west1.
services:
  app:
    environment:
      AP_FRONTEND_URL: https://dev.layan.ai

  worker:
    environment:
      AP_RUNTIME: GCP_CLOUD_RUN
      AP_GCP_REGION: europe-west1
      GOOGLE_APPLICATION_CREDENTIALS: /gcp-key.json
      AP_WORKER_CONCURRENCY: ${AP_WORKER_CONCURRENCY:-100}
      AP_POOL_CPU: ${AP_POOL_CPU:-1}
      AP_POOL_MEMORY: ${AP_POOL_MEMORY:-1Gi}
      AP_POOL_CONCURRENCY: ${AP_POOL_CONCURRENCY:-1}
      AP_POOL_MAX_INSTANCES: ${AP_POOL_MAX_INSTANCES:-100}
    volumes:
      - /Users/abuaboud/gcp-deployer-key.json:/gcp-key.json:ro
