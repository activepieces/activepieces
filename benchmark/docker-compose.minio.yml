# Overlay that adds a local MinIO (S3-compatible) object store to the benchmark
# stack so the smoke test can exercise the S3 file-storage path end to end.
#
# Usage (the smoke workflow sets AP_FILE_STORAGE_LOCATION=S3 and the AP_S3_* vars):
#   docker compose -f benchmark/docker-compose.yml -f benchmark/docker-compose.minio.yml up -d
#
# The app validates its S3 configuration on boot (system-validator), so the
# bucket must already exist — minio-init creates it before app/worker start.
services:
  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 3s
      timeout: 5s
      retries: 20
    networks:
      - bench

  minio-init:
    image: minio/mc:RELEASE.2024-09-16T17-43-14Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/activepieces &&
      echo 'bucket activepieces ready'
      "
    networks:
      - bench

  app:
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

  worker:
    depends_on:
      app:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

volumes:
  minio_data:
